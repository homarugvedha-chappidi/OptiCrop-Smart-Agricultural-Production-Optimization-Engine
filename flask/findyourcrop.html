<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Recommendation | OptiCrop</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

<nav>

<div class="logo">
🌿 OptiCrop
</div>

<div class="nav-links">

<a href="/">Home</a>

<a href="/about">About</a>

<a href="/findyourcrop">Predict</a>

</div>

</nav>

</header>

<section class="prediction-page">

<div class="prediction-card">

<h2>Get Crop Recommendation</h2>

<p>
Enter the soil and environmental parameters below.
</p>

<form action="/predict" method="POST">

<input type="number" name="nitrogen" placeholder="Nitrogen (N)" required>

<input type="number" name="phosphorous" placeholder="Phosphorus (P)" required>

<input type="number" name="potassium" placeholder="Potassium (K)" required>

<input type="number" step="any" name="temperature" placeholder="Temperature (°C)" required>

<input type="number" step="any" name="humidity" placeholder="Humidity (%)" required>

<input type="number" step="any" name="ph" placeholder="pH Value" required>

<input type="number" step="any" name="rainfall" placeholder="Rainfall (mm)" required>

<button type="submit">
Get Recommendation
</button>

</form>

{% if prediction_text %}

<div class="result-card">

<h3>🌾 Recommendation</h3>

<h2>{{ prediction_text }}</h2>

</div>

{% endif %}

</div>

</section>

<footer>

<p>
© 2026 OptiCrop • Smart Agricultural Production Optimization Engine
</p>

</footer>

</body>

</html>
